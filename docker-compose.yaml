version: '3'
services:
  mosquitto:
    build: ./mosquitto/docker
    container_name: mosquitto
    env_file: ./mosquitto/settings/mqtt.env
    ports:
      - "1883:1883"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 50m 

  home:
   build: 
    context: ./ddns/docker
   env_file: ./ddns/settings/token.env
   environment:
     - SUBDOMAIN="home-alt"
   restart: always

  hass:
    image: homeassistant/home-assistant:latest #0.100.3
    container_name: hass
    volumes:
      - ./hass/settings:/config
      - ./secrets/hass-alt/settings/secrets.yaml:/config/secrets.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8123:8123"
      - "9898:9898/udp"
      - "4321:4321/udp"
      - "51827:51827" #Homekit
    depends_on:
    #  - mysql
     - mosquitto
     - tor
    #  - broadlink
    network_mode: "host"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: 50m
  
  tor:
   build: 
    context: ./tor/docker
   container_name: tor
   ports:
      - "9150:9150"
   restart: always

  appdaemon:
    build:
      context: ./appdaemon/docker
    container_name: appdaemon
    depends_on:
      - hass
    volumes:
      - ./appdaemon/settings:/conf
      - ./secrets/hass-alt/settings/secrets.yaml:/conf/secrets.yaml:ro
      - /etc/localtime:/etc/localtime:ro
    restart: always
    links:
      - "hass"
    logging:
      driver: json-file
      options:
          max-size: "10m"
          max-file: "5"


  esphome:
    image: esphome/esphome-armv7
    container_name: esphome
    ports:
      - "6052:6052"
    volumes:
      - ./esphome/settings:/config
      - ./secrets/hass-alt/settings/secrets.yaml:/config/secrets.yaml:ro
    network_mode: "host"
    logging:
      driver: json-file
      options:
          max-size: "10m"
          max-file: "5"

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest-dev
    container_name: zigbee2mqtt
    volumes:
      - ./zigbee2mqtt/settings:/app/data
    devices:
      - /dev/zigbee:/dev/ttyACM0
    privileged: true
    restart: always
    logging:
      driver: json-file
      options:
        max-size: 50m  
        
  rass:
    build:
      context: ./rass/docker
      dockerfile: Dockerfile-rpi
    container_name: rass
    network_mode: host
    volumes:
      - ./rass/settings/local.json:/room-assistant/config/local.json
    # env_file: 
    #  - ./mosquitto/settings/mqtt.env
     # - ./rass/settings/rass.env
    # environment:
    #   MQTT_URL: 'mqtt://192.168.1.6'
    #   AUTO_DISCOVERY: 'true'
    #   BLE_WHITELIST: '["c339570b5315","1862e411fd87"]'
    #   BLE_CHANNEL: 'home/presence'
    #   ROOM: 'balcony'
    #   SERVICES: 'ble,mqtt'
      # - LOGGER=true
      # - LOGLEVEL=info
      # - 
      # - MQTT_REJECT_UNAUTHORIZED=true
      # - AUTO_DISCOVERY=true
    restart: always
    logging:
      driver: json-file
      options:
          max-size: "10m"
          max-file: "5"

  nginx:
    image: nginx
    hostname: nginx
    container_name: nginx
    links:
      - "hass"
      - "appdaemon"
      - "certbot"
    volumes:
        - ./nginx/settings/site-confs:/etc/nginx/conf.d
        - ./certbot/settings/data:/config/keys
    ports:
        - "80:80"
        - "443:443"
    restart: always
    logging:
      driver: json-file
      options:
          max-size: "10m"
          max-file: "5"

  certbot:
    build:
      context: ./certbot/docker
      dockerfile: Dockerfile-rpi
    restart: always
    container_name: certbot
    volumes:
        - ./certbot/docker/update_certs.sh:/update_certs.sh:ro
        - ./certbot/settings/data:/etc/letsencrypt
        - /etc/localtime:/etc/localtime:ro
    ports:
        - "8081:80"
    # entrypoint: certbot
    # command: certonly --standalone --agree-tos --non-interactive --email admin@yandex5.ru -d home-alt.yandex5.ru
    logging:
      driver: json-file
      options:
          max-size: "10m"
          max-file: "5"